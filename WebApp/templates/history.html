<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Scan History - PotatoGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#012d1d",
                        "primary-container": "#1b4332",
                        "secondary": "#1f6d1a",
                        "secondary-container": "#a4f792",
                        "surface": "#f7faf8",
                        "surface-container-low": "#f1f4f2",
                        "surface-container-high": "#e6e9e7",
                        "on-surface-variant": "#414844",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100dvh;
        }
    </style>
</head>

<body class="bg-surface text-[#181c1b] antialiased">
    <nav class="fixed top-0 w-full z-50 bg-[#f7faf8]/80 backdrop-blur-lg border-b border-gray-100">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <a href="/" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                    <span class="material-symbols-outlined text-primary">arrow_back</span>
                </a>
                <h1 class="font-extrabold text-xl tracking-tight text-primary">PotatoGuard</h1>
            </div>
            <button onclick="clearHistory()"
                class="text-xs font-bold text-red-600 bg-red-50 px-3 py-1 rounded-full hover:bg-red-100 transition-colors">
                Clear All
            </button>
        </div>
    </nav>

    <main class="pt-24 pb-32 px-6 max-w-5xl mx-auto">
        <header class="mb-10">
            <h2 class="text-3xl font-extrabold text-primary mb-2">Scan History</h2>
            <p class="text-on-surface-variant text-sm">Review the health trends of your potato crops.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
            <div
                class="md:col-span-2 bg-surface-container-low rounded-3xl p-8 flex flex-col justify-between border border-gray-100">
                <div>
                    <span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Field Health
                        Overview</span>
                    <div class="flex items-baseline gap-2 mt-2">
                        <span id="health-percentage" class="text-5xl font-extrabold text-primary">--%</span>
                        <span class="text-secondary font-bold flex items-center gap-1 text-sm">
                            <span class="material-symbols-outlined text-sm">analytics</span> Live Data
                        </span>
                    </div>
                </div>
                <div class="mt-6 flex gap-4">
                    <div class="flex items-center gap-2 px-4 py-2 bg-secondary-container rounded-full">
                        <div class="w-2 h-2 rounded-full bg-secondary"></div>
                        <span id="count-healthy" class="text-xs font-bold text-on-secondary-container">0 Healthy</span>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 bg-error-container rounded-full">
                        <div class="w-2 h-2 rounded-full bg-error"></div>
                        <span id="count-alerts" class="text-xs font-bold text-on-error-container">0 Alerts</span>
                    </div>
                </div>
            </div>
            <div
                class="bg-primary text-white rounded-3xl p-8 flex flex-col justify-center items-center text-center shadow-lg">
                <span class="material-symbols-outlined text-4xl mb-4 text-emerald-400">agriculture</span>
                <p class="text-xs font-medium opacity-80 mb-1">Total Scans</p>
                <p id="total-scans" class="text-3xl font-bold">0</p>
            </div>
        </div>

        <section id="history-list" class="grid grid-cols-1 gap-6">
        </section>
    </main>

    <nav class="fixed bottom-0 w-full z-50 bg-white/90 backdrop-blur-md border-t border-gray-100">
        <div class="flex justify-around items-center px-4 pb-6 pt-3">
            <a href="/" class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 px-5 py-2">
                <span class="material-symbols-outlined">center_focus_strong</span>
                <span class="text-[10px] uppercase font-bold mt-1">Scan</span>
            </a>
            <a href="/history"
                class="flex flex-col items-center justify-center bg-primary text-white rounded-2xl px-5 py-2 active:scale-95 transition-transform">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>
                <span class="text-[10px] uppercase font-bold mt-1">History</span>
            </a>
            <a href="/tips"
                class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-2 opacity-60 hover:opacity-100 transition-all active:scale-90">
                <span class="material-symbols-outlined">psychology</span>
                <span class="text-[10px] uppercase font-bold mt-1">Tips</span>
            </a>
        </div>
    </nav>

    <script>
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('potatoHistory')) || [];
            const listContainer = document.getElementById('history-list');

            // Update Stats
            const total = history.length;
            const healthyCount = history.filter(s => s.label.includes('Healthy')).length;
            const alertCount = total - healthyCount;
            const healthScore = total > 0 ? Math.round((healthyCount / total) * 100) : 0;

            document.getElementById('total-scans').innerText = total;
            document.getElementById('count-healthy').innerText = `${healthyCount} Healthy`;
            document.getElementById('count-alerts').innerText = `${alertCount} Alerts`;
            document.getElementById('health-percentage').innerText = `${healthScore}%`;

            if (total === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-20 border-2 border-dashed border-gray-200 rounded-3xl">
                        <span class="material-symbols-outlined text-5xl text-gray-200 mb-4">inventory_2</span>
                        <p class="text-gray-400 font-bold">No records found in this field</p>
                    </div>`;
                return;
            }

            // Generate Cards
            listContainer.innerHTML = history.map(scan => `
                <div class="group bg-white rounded-3xl overflow-hidden flex flex-col md:flex-row transition-all hover:shadow-xl hover:shadow-emerald-900/5 border border-gray-100 shadow-sm">
                    <div class="w-full md:w-64 h-48 md:h-auto overflow-hidden">
                        <img class="w-full h-full object-cover grayscale-[0.3] group-hover:grayscale-0 transition-all duration-700" src="${scan.image}">
                    </div>
                    <div class="flex-1 p-6 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold block mb-1">${scan.date}</span>
                                <h3 class="text-2xl font-bold text-primary">${scan.label}</h3>
                            </div>
                            <div class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${scan.label.includes('Healthy') ? 'bg-secondary-container text-on-secondary-container' : 'bg-error-container text-on-error-container'}">
                                ${scan.label.includes('Healthy') ? 'Optimal' : 'Action Required'}
                            </div>
                        </div>
                        <div class="mt-6 flex items-end justify-between">
                            <div class="flex gap-8">
                                <div>
                                    <p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-wider mb-1">Confidence</p>
                                    <p class="text-xl font-extrabold text-primary">${scan.confidence}%</p>
                                </div>
                            </div>
                            <button class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center active:scale-90 transition-transform">
                                <span class="material-symbols-outlined">arrow_forward</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if (confirm("Are you sure you want to delete all field records?")) {
                localStorage.removeItem('potatoHistory');
                loadHistory();
            }
        }

        // Run on load
        window.onload = loadHistory;
    </script>
</body>

</html>
